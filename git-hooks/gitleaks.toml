# Global gitleaks config — used by agent-config pre-commit/pre-push hooks.
# Mirrors notes/.gitleaks.toml + tightened patterns for cross-repo use.
#
# To override per-repo: place a `.gitleaks.toml` at repo root and pass
# it explicitly (this global config remains the default).

title = "agent-config global gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Example/test/doc tokens that look like secrets"
paths = [
  '''node_modules''',
  '''\.git''',
  '''dist/''',
  '''build/''',
  '''target/''',
  '''\.next/''',
  '''static/images/''',
  '''public/images/''',
  '''.*\.log$''',
  '''.*\.lance/''',
  '''.*\.lance$''',
  '''pnpm-lock\.yaml$''',
  '''package-lock\.json$''',
  '''yarn\.lock$''',
  '''Cargo\.lock$''',
  '''go\.sum$''',
  '''flake\.lock$''',
]
regexes = [
  '''(?i)example|placeholder|your[-_]?api[-_]?key|xxx+|test[-_]?key|sample|dummy|fake''',
]

# ============================================================
# AI / LLM API Keys
# ============================================================

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9_-]{20,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key (legacy)"
regex = '''sk-[a-zA-Z0-9]{20,}T3BlbkFJ[a-zA-Z0-9]{20,}'''
keywords = ["T3BlbkFJ"]

[[rules]]
id = "openai-project-key"
description = "OpenAI Project API Key"
regex = '''sk-proj-[a-zA-Z0-9_-]{40,}'''
keywords = ["sk-proj-"]

[[rules]]
id = "openrouter-api-key"
description = "OpenRouter API Key"
regex = '''sk-or-(v[0-9]+-)?[a-zA-Z0-9]{32,}'''
keywords = ["sk-or-"]

[[rules]]
id = "google-ai-api-key"
description = "Google AI / Gemini API Key"
regex = '''AIza[0-9A-Za-z_-]{35}'''
keywords = ["AIza"]

[[rules]]
id = "groq-api-key"
description = "Groq API Key"
regex = '''gsk_[a-zA-Z0-9]{20,}'''
keywords = ["gsk_"]

[[rules]]
id = "huggingface-token"
description = "HuggingFace Token"
regex = '''hf_[a-zA-Z0-9]{20,}'''
keywords = ["hf_"]

[[rules]]
id = "replicate-api-token"
description = "Replicate API Token"
regex = '''r8_[a-zA-Z0-9]{20,}'''
keywords = ["r8_"]

[[rules]]
id = "mistral-api-key"
description = "Mistral API Key assignment"
regex = '''(?i)(mistral[_-]?api[_-]?key|MISTRAL_API_KEY)\s*[=:]\s*['"]?([a-zA-Z0-9]{20,})['"]?'''
secretGroup = 2

# ============================================================
# GitHub
# ============================================================

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''ghp_[a-zA-Z0-9]{36,}'''
keywords = ["ghp_"]

[[rules]]
id = "github-fine-grained-pat"
description = "GitHub Fine-grained PAT"
regex = '''github_pat_[a-zA-Z0-9_]{20,}'''
keywords = ["github_pat_"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''gho_[a-zA-Z0-9]{36,}'''
keywords = ["gho_"]

[[rules]]
id = "github-app-token"
description = "GitHub App Installation Token"
regex = '''(ghs|ghu)_[a-zA-Z0-9]{36,}'''
keywords = ["ghs_", "ghu_"]

# ============================================================
# Korean Services
# ============================================================

[[rules]]
id = "naver-api-key"
description = "Naver API Key assignment"
regex = '''(?i)(naver[_-]?(?:client[_-]?)?(?:id|secret|key))\s*[=:]\s*['"]?([a-zA-Z0-9]{16,})['"]?'''
secretGroup = 2

[[rules]]
id = "kakao-api-key"
description = "Kakao API Key assignment"
regex = '''(?i)(kakao[_-]?(?:rest[_-]?)?(?:api[_-]?)?key)\s*[=:]\s*['"]?([a-zA-Z0-9]{20,})['"]?'''
secretGroup = 2

# ============================================================
# Telegram / Slack / Discord
# ============================================================

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot Token"
regex = '''[0-9]{8,10}:[a-zA-Z0-9_-]{35}'''
keywords = [":AAH", ":AAE", ":AAG"]

[[rules]]
id = "slack-bot-token"
description = "Slack Bot Token"
regex = '''xox[baprs]-[0-9a-zA-Z-]{10,}'''
keywords = ["xoxb-", "xoxp-", "xoxa-", "xoxr-", "xoxs-"]

[[rules]]
id = "discord-bot-token"
description = "Discord Bot Token"
regex = '''[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}'''

# ============================================================
# Generic patterns (entropy-gated to reduce false positives)
# ============================================================

[[rules]]
id = "generic-secret-assignment"
description = "Generic secret assignment (password/token/key)"
regex = '''(?i)(password|passwd|pwd|secret|token|api[_-]?key|auth[_-]?token|access[_-]?token|private[_-]?key)\s*[=:]\s*['"]([a-zA-Z0-9/+=_-]{20,})['"]'''
secretGroup = 2
entropy = 3.5

[[rules]]
id = "env-secret"
description = "Environment variable assignment with secret-shaped value"
regex = '''(?i)export\s+([\w]+(?:SECRET|TOKEN|KEY|PASSWORD|PASSWD|PWD)[\w]*)\s*=\s*['"]?([a-zA-Z0-9/+=_-]{16,})['"]?'''
secretGroup = 2
entropy = 3.5

# ============================================================
# Connection strings
# ============================================================

[[rules]]
id = "database-url"
description = "Database connection string with embedded credentials"
regex = '''(?i)(mysql|postgres|postgresql|mongodb|redis|amqp):\/\/[^:\/\s]+:([^@\/\s]{6,})@'''
secretGroup = 2

[[rules]]
id = "smtp-credentials"
description = "SMTP credentials in URL"
regex = '''(?i)smtp:\/\/[^:\/\s]+:([^@\/\s]{6,})@'''
secretGroup = 1

# ============================================================
# Private keys (PEM)
# ============================================================

[[rules]]
id = "private-key-pem"
description = "Private key in PEM format"
regex = '''-----BEGIN\s+(?:RSA\s+|DSA\s+|EC\s+|PGP\s+)?PRIVATE\s+KEY-----'''
keywords = ["BEGIN", "PRIVATE", "KEY"]

[[rules]]
id = "ssh-private-key"
description = "OpenSSH private key"
regex = '''-----BEGIN\s+OPENSSH\s+PRIVATE\s+KEY-----'''
keywords = ["OPENSSH", "PRIVATE"]

# ============================================================
# Cloud providers
# ============================================================

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''\bAKIA[0-9A-Z]{16}\b'''
keywords = ["AKIA"]

[[rules]]
id = "gcp-service-account"
description = "GCP Service Account JSON marker"
regex = '''"type"\s*:\s*"service_account"'''
keywords = ["service_account"]
